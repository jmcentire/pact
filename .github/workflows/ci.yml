name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system tools used by tests
        # universal-ctags + cscope are exercised by tests/test_tool_index.py
        # via tool_index.py. Pre-installed on macOS dev boxes; not on the
        # ubuntu-latest runner.
        run: sudo apt-get update && sudo apt-get install -y universal-ctags cscope

      - name: Install dependencies
        # Include the optional extras whose modules tests/ actually exercises:
        # all-backends → anthropic, openai, google-genai (test_*_backend.py)
        # analysis     → tree-sitter (test_tool_index.py)
        # Without these, tests fail with ModuleNotFoundError in CI but pass
        # locally for anyone with the full install.
        run: pip install -e ".[dev,all-backends,analysis,mcp]" httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Lint (static errors only)
        run: |
          pip install ruff
          ruff check src/ --select E9,F
